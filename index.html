<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f5e5e">
<title>дә’еӢ•ж—…йҒҠиЎҢзЁӢиҰҸеҠғеҷЁ</title>
<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",Arial,sans-serif;
  --ink:#18211f;--muted:#66736f;--line:#d9e2df;--paper:#fff;--soft:#f5f8f5;
  --teal:#0f5e5e;--mint:#dff5eb;--sun:#f2a93b;--rose:#d85d7b;--blue:#3977d4;
  --shadow:0 18px 45px rgba(20,45,40,.14);--r:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#edf4f0;color:var(--ink);font-family:var(--font-sans);-webkit-text-size-adjust:100%}
body{min-height:100vh;font-size:15px;line-height:1.45;background:linear-gradient(180deg,#edf4f0 0,#fff7eb 100%);color:var(--ink)}
button,input,select,textarea{font:inherit}
button{touch-action:manipulation}
a{text-decoration:none}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
#root{min-height:100vh}
.app{min-height:100vh;max-width:980px;margin:0 auto;background:rgba(255,255,255,.7);box-shadow:0 0 0 1px rgba(255,255,255,.55)}
.cover{position:relative;z-index:30;aspect-ratio:16/9;min-height:200px;max-height:360px;color:#fff;background:#0f5e5e;background-image:linear-gradient(to bottom,rgba(0,0,0,.55) 0%,rgba(0,0,0,.05) 38%,rgba(0,0,0,.05) 55%,rgba(0,0,0,.72) 100%),var(--cover);background-size:cover;background-position:center var(--cover-pos,30%);display:flex;flex-direction:column;justify-content:space-between}
.cover-menu-wrap{position:static;z-index:250;flex-shrink:0}
.cover-menu{position:fixed;right:12px;top:60px;z-index:250;min-width:190px;padding:8px;border-radius:18px;background:rgba(255,255,255,.97);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.7);box-shadow:0 18px 44px rgba(18,38,35,.28)}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:16px 16px 0}
.cover-bottom{padding:0 16px 18px;display:flex;flex-direction:column;gap:6px}
.hdr-title{font-size:26px;line-height:1.15;font-weight:900;letter-spacing:-.5px;cursor:pointer;text-shadow:0 2px 16px rgba(0,0,0,.5);word-break:break-word}
.hdr-title-edit-icon{font-size:14px;opacity:.65;margin-left:4px;vertical-align:middle}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.82);text-shadow:0 1px 8px rgba(0,0,0,.4);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hdr-sub-chip{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:2px 9px;font-size:11px;font-weight:700;backdrop-filter:blur(6px)}
.stats-strip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0;background:var(--card);border-bottom:1px solid var(--line);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.stat-cell{padding:13px 14px;display:flex;flex-direction:column;gap:3px;position:relative}
.stat-cell+.stat-cell::before{content:'';position:absolute;left:0;top:18%;height:64%;width:1px;background:var(--line)}
.stat-n{font-size:20px;font-weight:900;color:var(--ink);letter-spacing:-.5px;line-height:1}
.stat-l{font-size:11px;color:var(--muted);font-weight:700}
.cover-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.glass{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.26);backdrop-filter:blur(10px)}
.cover-menu-wrap{position:relative;z-index:80;flex-shrink:0}
.hamb{width:46px;height:46px;border-radius:999px;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.16);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;box-shadow:0 12px 28px rgba(0,0,0,.16)}
.hamb span{width:20px;height:2px;border-radius:99px;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.2)}
.cover-menu{position:absolute;right:0;top:54px;z-index:120;min-width:190px;padding:8px;border-radius:18px;background:rgba(255,255,255,.94);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.7);box-shadow:0 18px 44px rgba(18,38,35,.24)}
.cover-menu button{width:100%;border:0;background:transparent;color:#1b2926;display:flex;align-items:center;gap:10px;padding:12px 11px;border-radius:12px;font-weight:900;cursor:pointer;text-align:left}
.cover-menu button:active,.cover-menu button:hover{background:#eef7f3}
.cover-menu .mi{width:24px;height:24px;border-radius:8px;background:#e4f3ed;display:flex;align-items:center;justify-content:center;color:#0f5e5e}
.title-edit{display:flex;gap:8px;align-items:center;width:100%;margin-top:auto}
.tni{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:12px;padding:11px 12px;font-size:18px;font-family:var(--font-sans);flex:1;min-width:0}
.tni::placeholder{color:rgba(255,255,255,.62)}
.quick{display:none}
.nav{position:sticky;top:0;z-index:20;display:flex;gap:6px;padding:8px;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(217,226,223,.8)}
.nav-btn{flex:1;min-height:42px;padding:8px 6px;font-size:14px;color:var(--muted);border:0;background:transparent;border-radius:999px;cursor:pointer}
.nav-btn.on{color:#fff;background:var(--teal);font-weight:700;box-shadow:0 7px 18px rgba(15,94,94,.22)}
.body{padding:14px 14px calc(24px + env(safe-area-inset-bottom))}
.day-tabs{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;margin-bottom:12px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.dtab{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);box-shadow:0 4px 14px rgba(29,58,50,.05)}
.dtab.on{background:#183b40;color:#fff;border-color:#183b40}
.dtab-add{border-style:dashed;background:#fff8ec;color:#8b540c}
.section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.section-title-wrap{display:flex;flex-direction:column;gap:6px;min-width:0;flex:1;}
.section-title{font-weight:800;font-size:17px;line-height:1.25;min-width:0;word-break:keep-all;color:var(--ink);}
.section-meta{display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
.section-meta-date{font-size:12px;font-weight:700;color:var(--muted);display:inline-flex;align-items:center;gap:3px;}
.section-actions{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:nowrap;position:relative;flex-shrink:0}
.action-group{display:flex;align-items:center;gap:7px;position:relative;flex-wrap:nowrap}
.quick-holder{position:relative}
.card{background:var(--paper);border-radius:var(--r);border:1px solid rgba(217,226,223,.9);margin-bottom:10px;overflow:hidden;box-shadow:0 8px 24px rgba(31,59,53,.06)}
.loc-wrap{display:grid;grid-template-columns:56px minmax(0,1fr);gap:10px;padding:14px;padding-right:114px}
.loc-time{font-size:12px;font-weight:800;color:#0f6e56;padding-top:2px;width:56px;min-width:56px;white-space:nowrap;font-variant-numeric:tabular-nums}
.loc-name{font-weight:800;font-size:15px;margin-bottom:3px;word-break:break-word}
.loc-addr,.loc-phone{font-size:13px;color:var(--muted);margin-bottom:6px;word-break:break-word}
.loc-phone{display:flex;align-items:center;gap:6px}
.loc-phone a{color:#0c447c;font-weight:800}
.loc-note-wrap{margin-bottom:8px;}
.loc-note-pill{font-size:12px;color:#56635f;background:#f3f7f5;padding:6px 10px;border-left:3px solid #8ad5b6;cursor:pointer;border-radius:0 6px 6px 0;display:flex;align-items:center;gap:6px;user-select:none;transition:background .15s;}
.loc-note-pill:hover{background:#e6f4ed;}
.loc-note-pill-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.loc-note-pill-hint{font-size:11px;font-weight:800;color:#42a787;flex-shrink:0;}
/* в”Җв”Җ Hero card expand (App Store style) в”Җв”Җ */
.note-hero-backdrop{position:fixed;inset:0;z-index:80;pointer-events:none;
  background:rgba(0,0,0,0);transition:background .35s ease;-webkit-backdrop-filter:blur(0px);backdrop-filter:blur(0px);
  transition:background .35s ease,backdrop-filter .35s ease,-webkit-backdrop-filter .35s ease;}
.note-hero-backdrop.open{background:rgba(0,0,0,.25);pointer-events:auto;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}
.note-hero-card{position:fixed;z-index:81;background:#fff;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.12);will-change:transform,border-radius,width,height,top,left;
  display:flex;flex-direction:column;transform-origin:top left;}
.note-hero-card.expanding{transition:top .42s cubic-bezier(.32,1.12,.6,1),left .42s cubic-bezier(.32,1.12,.6,1),width .42s cubic-bezier(.32,1.12,.6,1),height .42s cubic-bezier(.32,1.12,.6,1),border-radius .42s cubic-bezier(.32,1.12,.6,1),box-shadow .42s ease;}
.note-hero-card.collapsing{transition:top .36s cubic-bezier(.4,0,.2,1),left .36s cubic-bezier(.4,0,.2,1),width .36s cubic-bezier(.4,0,.2,1),height .36s cubic-bezier(.4,0,.2,1),border-radius .36s cubic-bezier(.4,0,.2,1),box-shadow .36s ease;}
.note-hero-inner{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity .2s ease .1s;}
.note-hero-card.expanding .note-hero-inner{opacity:1;}
.note-hero-card.collapsing .note-hero-inner{opacity:0;transition:opacity .15s ease;}
.note-hero-stripe{height:5px;flex-shrink:0;}
.note-hero-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px;flex-shrink:0;}
.note-hero-title{font-weight:900;font-size:18px;color:var(--ink);flex:1;line-height:1.3;}
.note-hero-close{width:32px;height:32px;border-radius:50%;background:#f2f2f7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:#555;flex-shrink:0;transition:background .15s;}
.note-hero-close:hover{background:#e2e2ea;}
.note-hero-body{flex:1;overflow-y:auto;padding:4px 20px 20px;font-size:15px;line-height:1.85;color:#2d4a3e;white-space:pre-wrap;word-break:break-word;-webkit-overflow-scrolling:touch;}
.note-hero-actions{padding:12px 20px calc(16px + env(safe-area-inset-bottom,0));flex-shrink:0;border-top:1px solid #f0f0f0;}
.loc-sort-col{display:contents}
.sort-btn{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:0;user-select:none;-webkit-user-select:none;flex-shrink:0}
.sort-btn:disabled{opacity:.2;cursor:not-allowed}
.sort-grip{cursor:grab;color:#b0bdb9;touch-action:none}
.sort-grip:active{cursor:grabbing;color:#42a787}
.quick-menu{position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;width:min(88vw,260px);background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:0 8px 28px rgba(0,0,0,.18);z-index:100;padding:5px;display:flex;flex-direction:column;gap:1px;transition:opacity .15s ease;}
.quick-item{width:100%;text-align:left;background:none;border:none;padding:9px 11px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:8px;white-space:nowrap}
.quick-item:hover,.quick-item:active{background:#f0faf5}
.brow{display:flex;gap:7px;flex-wrap:wrap}
.btn{min-height:34px;padding:7px 12px;font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;gap:4px}
.btn:active{transform:scale(.98)}
.bp{background:var(--teal);color:#fff;border-color:var(--teal)}
.ba{background:#8a560c;color:#fff;border-color:#8a560c}
.br{background:#fff0f2;color:#a52f49;border-color:#ffd0d8}
.add-btn{width:100%;min-height:48px;padding:12px;border:1px dashed #aebcb7;border-radius:var(--r);color:#52605c;font-size:14px;font-weight:800;cursor:pointer;background:#fff;margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}
.stat{background:#fff;border-radius:var(--r);padding:14px;border:1px solid var(--line);box-shadow:0 8px 24px rgba(31,59,53,.05)}
.stat:nth-child(2){background:#fff8ec}
.stat-n{font-size:21px;font-weight:900;color:#0f5e5e;word-break:break-word}
.stat-l{font-size:12px;color:var(--muted);margin-top:2px}
.exp-row{display:flex;align-items:center;gap:11px;padding:14px}
.cat-ic{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exp-inf{flex:1;min-width:0}
.exp-nm{font-weight:800;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-mt{font-size:12px;color:var(--muted);margin-top:2px}
.exp-rt{text-align:right;flex-shrink:0}
.exp-am{font-size:15px;font-weight:900}
.sh{font-size:12px;color:var(--muted);margin-bottom:8px;margin-top:14px;letter-spacing:0;text-transform:none;font-weight:900}
.brow2{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid rgba(217,226,223,.8)}
.brow2:last-child{border-bottom:none}
.txn{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:13px;background:#fff8e8;border-radius:var(--r);margin-bottom:8px;border:1px solid #f4ce84}
.empty{text-align:center;padding:34px 12px;color:var(--muted);font-size:14px}
.chip{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border-radius:999px;font-size:13px;background:#e7f6f0;color:#085041;border:1px solid #b7dfcf;font-weight:700}
.chipx{cursor:pointer;font-size:14px;line-height:1}
.avatar-pick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px}
.avatar-btn{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer}
.avatar-btn.on{border-color:#0f5e5e;background:#e7f6f0;box-shadow:0 0 0 3px rgba(15,94,94,.12)}
.bar-lb{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;gap:10px}
.bar-tr{height:7px;background:#edf2f0;border-radius:999px;margin-bottom:9px;overflow:hidden}
.mol{position:fixed;inset:0;background:rgba(10,18,17,.5);z-index:50;display:flex;align-items:flex-end;padding-top:40px}
.msh{width:100%;max-width:720px;margin:0 auto;background:#fff;border-radius:22px 22px 0 0;padding:20px 16px calc(18px + env(safe-area-inset-bottom));overflow-y:auto;max-height:min(86vh,720px);box-shadow:var(--shadow)}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mt{font-size:18px;font-weight:900}
.mcl{cursor:pointer;color:var(--muted);font-size:22px;line-height:1;padding:4px 8px}
.fg{margin-bottom:13px}
.fl{font-size:13px;color:#53615d;margin-bottom:6px;display:block;font-weight:800}
input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 12px;color:var(--ink);outline:none}
input:focus,select:focus,textarea:focus{border-color:#42a787;box-shadow:0 0 0 3px rgba(66,167,135,.15)}
.sc{padding:8px 12px;border-radius:999px;font-size:13px;font-weight:800;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);user-select:none}
.sc.on{background:#0f5e5e;color:#fff;border-color:#0f5e5e}
.scs{display:flex;flex-wrap:wrap;gap:7px}
.ah{font-size:12px;color:#0f6e56;margin-top:6px;font-weight:800}
.tip{font-size:12px;color:var(--muted);margin-top:9px}
.ar{display:flex;gap:9px;margin-top:4px}
.cover-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
.cover-choice{height:78px;border-radius:14px;border:2px solid transparent;background-size:cover;background-position:center;cursor:pointer;position:relative;overflow:hidden}
.cover-choice.on{border-color:#0f5e5e}
.cover-choice span{position:absolute;left:8px;bottom:7px;color:#fff;font-size:12px;font-weight:900;text-shadow:0 1px 6px rgba(0,0,0,.45)}
.tool-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.tmpl-btn{padding:8px 13px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid rgba(0,0,0,.06);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:opacity .15s,transform .1s}
.tmpl-btn:active{transform:scale(.97)}
/* sort controls top-right of card */
.loc-sort-ctrl{position:absolute;top:8px;right:8px;display:flex;gap:0;align-items:center;z-index:2;background:rgba(0,0,0,.04);border-radius:999px;overflow:hidden;transition:background .15s;}
.loc-sort-ctrl:hover{background:rgba(0,0,0,.07);}
.loc-sort-ctrl.sort-below{top:40px;}
.sort-btn{width:28px;height:26px;border-radius:0;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;border:none;background:transparent;color:#aab8b4;padding:0;user-select:none;-webkit-user-select:none;flex-shrink:0;transition:background .12s,color .12s;}
.sort-btn:hover:not([disabled]){background:rgba(15,94,94,.13);color:#0f5e5e;}
.sort-btn:active:not([disabled]){background:rgba(15,94,94,.22);}
.sort-btn[disabled]{opacity:.25;cursor:not-allowed;}
.sort-btn:disabled{opacity:.2;cursor:not-allowed}
.sort-grip{cursor:grab;color:#b0bdb9;letter-spacing:-.5px;touch-action:none;font-size:17px}
.sort-grip:active{cursor:grabbing;color:#42a787}
/* icon action buttons */
.act-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px}
.btn-ic{width:34px;height:34px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);flex-shrink:0;text-decoration:none;padding:0;line-height:1}
.btn-ic.bp{background:#0f5e5e;border-color:#0f5e5e;color:#fff}
.btn-ic.ba{background:#854F0B;border-color:#854F0B;color:#fff}
.btn-ic.br{background:#fff5f5;border-color:#f5c6cb;color:#c0392b}
.note-modal-body{font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;color:var(--ink);background:#f3f7f5;border-radius:var(--r);padding:14px;border-left:3px solid #8ad5b6;margin-bottom:14px;max-height:40vh;overflow-y:auto}
.memo-add-row{display:flex;gap:7px;margin-top:14px;align-items:stretch}
.memo-cat-sel{font-size:13px;padding:0 6px;border-radius:var(--r);border:1px solid var(--line);background:var(--card);color:var(--ink);min-height:44px;width:90px;flex-shrink:0}
.memo-cat-hd{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:14px;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.memo-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--card);border-radius:var(--r);border:1px solid var(--line);margin-bottom:6px}
.memo-item.done .memo-text{text-decoration:line-through;color:var(--muted);opacity:.55}
.memo-cb{width:22px;height:22px;border-radius:7px;border:2px solid #aebcb7;background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .12s;font-size:13px}
.memo-cb.on{background:#0f5e5e;border-color:#0f5e5e;color:#fff}
.memo-text{font-size:14px;flex:1;min-width:0;word-break:break-word;line-height:1.5}
.memo-del{color:var(--muted);font-size:20px;cursor:pointer;opacity:.35;flex-shrink:0;line-height:1;padding:0 2px;margin-top:-1px}
.memo-del:hover,.memo-del:active{opacity:.9}
.loc-cat-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:800;vertical-align:middle;white-space:nowrap}
.loc-now-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:900;border:none;animation:now-pulse 1.8s ease-in-out infinite;letter-spacing:.02em}
@keyframes now-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.78;transform:scale(.97)}}
.loc-card-wrap.loc-now>.card{background:linear-gradient(160deg,var(--now-bg,#f4fcf8) 0%,#fff 55%)!important}
.loc-now-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:12px;font-weight:900;letter-spacing:.04em}
.wx-badge{display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px 3px 6px;border-radius:999px;cursor:pointer;
  font-size:12px;font-weight:800;color:#0f5e5e;
  background:rgba(15,94,94,.08);border:1px solid rgba(15,94,94,.15);
  transition:background .15s;user-select:none;vertical-align:middle;flex-shrink:0;}
.wx-badge:hover{background:rgba(15,94,94,.15);}
.wx-badge-ic{font-size:16px;line-height:1;}
.weather-loading{font-size:11px;color:var(--muted);margin-left:10px;font-weight:700;}
/* в”Җв”Җ Weather detail sheet в”Җв”Җ */
.wx-sheet-bd{padding:20px;}
.wx-sheet-city{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:4px;}
.wx-sheet-temp{font-size:48px;font-weight:900;color:var(--ink);line-height:1;margin-bottom:2px;}
.wx-sheet-desc{font-size:16px;color:var(--muted);font-weight:700;margin-bottom:20px;}
.wx-sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.wx-sheet-item{background:#f5f8f6;border-radius:12px;padding:12px 14px;}
.wx-sheet-label{font-size:11px;color:var(--muted);font-weight:800;margin-bottom:4px;letter-spacing:.05em;}
.wx-sheet-value{font-size:20px;font-weight:900;color:var(--ink);}
.import-area{width:100%;min-height:160px;border:1px solid var(--line);border-radius:var(--r);padding:10px 12px;font-size:13px;font-family:var(--font,sans-serif);resize:vertical;background:var(--color-background-secondary,#f8fafa);line-height:1.6}
.import-preview{background:#f0f8f4;border:1px solid #b6e0cc;border-radius:var(--r);padding:12px;margin-top:10px;font-size:12px;max-height:220px;overflow-y:auto}
.import-day-hd{font-weight:900;font-size:13px;color:#085041;margin-bottom:4px;margin-top:10px}
.import-day-hd:first-child{margin-top:0}
.import-loc-row{display:flex;gap:6px;align-items:baseline;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.import-loc-time{font-size:11px;color:var(--muted);min-width:38px;flex-shrink:0}
.import-loc-name{font-size:13px;font-weight:700}
.import-loc-cat{font-size:10px;padding:1px 6px;border-radius:999px}
.import-err{color:#a32d2d;font-size:13px;padding:10px;background:#fff5f5;border-radius:var(--r);border:1px solid #f2baba;margin-top:8px}
.loc-card-wrap .card{border-left-width:3px;border-left-style:solid;position:relative}
.loc-card-wrap.dragging{opacity:.35;transform:scale(.98)}
.loc-card-wrap.drag-over .card{border-color:#42a787!important;box-shadow:0 0 0 2px rgba(66,167,135,.25)!important}
.budget-card{padding:14px;background:#fff;border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;box-shadow:0 8px 24px rgba(31,59,53,.05)}
.budget-line{height:9px;border-radius:999px;background:#edf2f0;overflow:hidden;margin-top:8px}
.budget-fill{height:100%;border-radius:999px;background:#1d9e75}
.budget-fill.warn{background:#ef9f27}.budget-fill.over{background:#d4535f}
.receipt-box{border:1px dashed #aebcb7;border-radius:14px;padding:12px;background:#f7faf8;margin-bottom:13px}
.mini{font-size:12px;color:var(--muted);font-weight:700}
@media (min-width:720px){
  .app{margin:18px auto;border-radius:24px;overflow:hidden;min-height:calc(100vh - 36px)}
  .cover{aspect-ratio:unset;min-height:320px;max-height:420px}
  .body{padding:20px 24px 34px}
  .hdr-title{font-size:36px;letter-spacing:-.8px}
  .stat-n{font-size:22px}
  .msh{border-radius:22px;margin-bottom:24px}
}
@media (max-width:640px){
  body{font-size:14px}
  .cover{aspect-ratio:16/9;min-height:180px;max-height:280px}
  .hdr-title{font-size:22px}
  .topbar{display:flex;align-items:flex-start}
  .cover-menu{right:12px;top:54px;left:auto;max-height:calc(100vh - 80px);overflow-y:auto}
  .mobile-stack{grid-template-columns:1fr!important}
  .mobile-stack > div{min-width:0}
  .mobile-stack input[type=time]{-webkit-appearance:none;appearance:none;text-align:left;min-height:54px}
  .section-head{display:grid;grid-template-columns:minmax(0,1fr);gap:10px;align-items:start}
  .section-title{font-size:19px;max-width:100%;word-break:keep-all;overflow-wrap:normal}
  .section-meta{gap:6px;}
  .section-meta-date{font-size:12px;}
  .wx-badge{font-size:12px;padding:3px 9px 3px 5px;}
  .section-actions{justify-content:space-between;width:100%;gap:8px}
  .action-group{gap:7px}
  .action-group.primary{flex:1;justify-content:flex-start}
  .action-group.manage{justify-content:flex-end}
  .section-actions .btn{min-height:42px;padding:8px 12px}
  .quick-menu{width:min(92vw,280px)}
  .loc-wrap{grid-template-columns:58px minmax(0,1fr);gap:9px;padding:13px 12px;padding-right:12px}
  .loc-time{width:58px;min-width:58px;font-size:15px;line-height:1.2;text-align:left}
  .loc-name{padding-right:108px}
  .loc-sort-ctrl{top:10px;right:10px}
  .act-row{padding-right:0}
  .stats{grid-template-columns:1fr}
  .txn{grid-template-columns:1fr;gap:4px;text-align:center}
  .txn div{text-align:center!important}
  .ar{flex-direction:column}
  .cover-grid{grid-template-columns:1fr}
  .body{padding-bottom:calc(86px + env(safe-area-inset-bottom))}
}

/* в”Җв”Җ Explore tab в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.exp-ctx-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f0faf6;border-radius:12px;border:1px solid #b7dfcf;margin-bottom:12px;flex-wrap:wrap;}
.exp-ctx-city{font-size:13px;font-weight:800;color:#085041;}
.exp-ctx-day{font-size:12px;color:var(--muted);}
.exp-cat-row{display:flex;gap:7px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none;flex-wrap:wrap;}
.exp-cat-row::-webkit-scrollbar{display:none;}
.exp-cat-btn{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.exp-cat-btn.on{background:#0f5e5e;color:#fff;border-color:#0f5e5e;}
.exp-search-row{display:flex;gap:8px;margin-bottom:14px;}
.exp-search-row input{flex:1;}
.exp-search-row button{flex-shrink:0;padding:0 18px;}
.exp-results{display:flex;flex-direction:column;gap:9px;}
.exp-card{background:#fff;border-radius:14px;border:1px solid var(--line);overflow:hidden;box-shadow:0 4px 14px rgba(31,59,53,.06);display:flex;align-items:stretch;}
.exp-card-left{width:5px;flex-shrink:0;}
.exp-card-body{flex:1;padding:12px 14px;min-width:0;}
.exp-card-name{font-weight:900;font-size:15px;margin-bottom:3px;word-break:break-word;}
.exp-card-addr{font-size:12px;color:var(--muted);margin-bottom:6px;word-break:break-word;}
.exp-card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.exp-card-tag{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700;}
.exp-card-actions{display:flex;gap:7px;flex-wrap:wrap;}
.exp-empty{text-align:center;padding:32px 12px;color:var(--muted);font-size:14px;}
.exp-loading{text-align:center;padding:24px 12px;color:var(--muted);font-size:14px;}
.exp-add-toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#0f5e5e;color:#fff;border-radius:12px;padding:10px 20px;font-size:14px;font-weight:800;z-index:200;box-shadow:0 8px 24px rgba(15,94,94,.35);pointer-events:none;animation:toast-in .25s ease;}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* в”Җв”Җ Wishlist tab в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.wl-topbar{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.wl-filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.wl-filter-row::-webkit-scrollbar{display:none;}
.wl-filter-btn{padding:7px 13px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.wl-filter-btn.on{background:#0f5e5e;color:#fff;border-color:#0f5e5e;}
.wl-action-row{display:flex;gap:8px;}
.wl-add-btn{flex:1;padding:9px 16px;border-radius:999px;font-size:13px;font-weight:800;background:#0f5e5e;color:#fff;border:none;cursor:pointer;white-space:nowrap;text-align:center;}
.wl-ai-btn{flex:1;padding:9px 16px;border-radius:999px;font-size:13px;font-weight:800;background:#5b3fc4;color:#fff;border:none;cursor:pointer;white-space:nowrap;text-align:center;}
.wl-group{margin-bottom:18px;}
.wl-group-label{font-size:11px;font-weight:900;letter-spacing:.07em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;padding-left:2px;}
.wl-card{background:#fff;border-radius:14px;border:1.5px solid var(--line);padding:13px 14px;margin-bottom:8px;position:relative;box-shadow:0 4px 14px rgba(31,59,53,.05);}
.wl-card-name{font-weight:900;font-size:15px;margin-bottom:3px;padding-right:28px;line-height:1.3;}
.wl-card-note{font-size:12px;color:var(--muted);margin-bottom:9px;line-height:1.5;}
.wl-card-actions{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.wl-day-btn{font-size:11px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:#f8fbf9;color:#0f5e5e;font-weight:800;cursor:pointer;white-space:nowrap;}
.wl-day-btn:active,.wl-day-btn:hover{background:#e4f4ec;border-color:#42a787;}
.wl-done-btn{font-size:11px;padding:4px 10px;border-radius:999px;border:1px solid #ccc;background:#f5f5f5;color:#888;font-weight:700;cursor:pointer;}
.wl-edit-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:#f5f5f5;color:#555;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.wl-edit-btn:hover{background:#e4f4ec;}
.wl-del-btn{width:26px;height:26px;border-radius:50%;border:none;background:none;color:#ccc;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:color .15s;}
.wl-del-btn:hover{color:#c00;}
.wl-del-btn:hover{background:#fee;color:#c00;}
.wl-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 8px;border-radius:999px;font-weight:800;margin-bottom:7px;}
.wl-empty{text-align:center;padding:40px 12px;color:var(--muted);}
.wl-toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#0f5e5e;color:#fff;border-radius:12px;padding:10px 20px;font-size:14px;font-weight:800;z-index:200;box-shadow:0 8px 24px rgba(15,94,94,.35);pointer-events:none;animation:wl-toast-in .25s ease;white-space:nowrap;}
@keyframes wl-toast-in{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.exp-ctx-bar{display:none;}
/* в”Җв”Җ Sync quick entry в”Җв”Җв”Җ */
.sync-quick{display:flex;align-items:center;gap:7px;margin-top:10px;padding:8px 12px;background:rgba(255,255,255,.14);border-radius:12px;border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(8px);}
.sync-quick input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:13px;font-weight:600;min-width:0;}
.sync-quick input::placeholder{color:rgba(255,255,255,.6);}
.sync-quick-btn{flex-shrink:0;background:rgba(255,255,255,.22);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:800;padding:5px 12px;cursor:pointer;white-space:nowrap;}
.sync-quick-btn:hover{background:rgba(255,255,255,.35);}

/* в•җв•җв•җв•җ HERO modal (App Store expand) в•җв•җв•җв•җ */
.hero-backdrop{position:fixed;inset:0;z-index:80;pointer-events:none;
  background:rgba(0,0,0,0);
  -webkit-backdrop-filter:blur(0px);backdrop-filter:blur(0px);
  transition:background .36s ease,-webkit-backdrop-filter .36s ease,backdrop-filter .36s ease;}
.hero-backdrop.open{background:rgba(0,0,0,.28);pointer-events:auto;
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);}
.hero-card{position:fixed;z-index:81;background:#fff;overflow:hidden;
  display:flex;flex-direction:column;will-change:top,left,width,height,border-radius;
  box-shadow:0 4px 20px rgba(0,0,0,.10);}
.hero-card.animating{transition:top .42s cubic-bezier(.32,1.12,.58,1),left .42s cubic-bezier(.32,1.12,.58,1),width .42s cubic-bezier(.32,1.12,.58,1),height .42s cubic-bezier(.32,1.12,.58,1),border-radius .42s cubic-bezier(.32,1.12,.58,1),box-shadow .42s ease;}
.hero-card.closing{transition:top .34s cubic-bezier(.4,0,.2,1),left .34s cubic-bezier(.4,0,.2,1),width .34s cubic-bezier(.4,0,.2,1),height .34s cubic-bezier(.4,0,.2,1),border-radius .34s cubic-bezier(.4,0,.2,1),box-shadow .34s ease;}
.hero-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px calc(18px + env(safe-area-inset-bottom));opacity:0;transition:opacity .18s ease .14s;}
.hero-card.animating .hero-body{opacity:1;}
.hero-card.closing .hero-body{opacity:0;transition:opacity .12s ease;}
/* в•җв•җв•җв•җ SHEET modal (bottom slide-up) в•җв•җв•җв•җ */
.sheet-backdrop{position:fixed;inset:0;z-index:80;pointer-events:none;
  background:rgba(0,0,0,0);transition:background .28s ease;}
.sheet-backdrop.open{background:rgba(0,0,0,.35);pointer-events:auto;}
.sheet-wrap{position:fixed;left:0;right:0;bottom:0;z-index:81;
  background:#fff;border-radius:22px 22px 0 0;
  padding:0 16px calc(18px + env(safe-area-inset-bottom));
  max-height:min(82vh,680px);overflow-y:auto;-webkit-overflow-scrolling:touch;
  box-shadow:0 -6px 32px rgba(0,0,0,.15);
  transform:translateY(110%);will-change:transform;
  transition:transform .36s cubic-bezier(.32,1.08,.58,1);}
.sheet-wrap.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:#d1d9d6;border-radius:999px;margin:10px auto 14px;}

/* в”Җв”Җ Location action sheet в”Җв”Җ */
.loc-action-sheet{display:flex;flex-direction:column;padding:0 0 8px;}
.loc-action-title{font-size:12px;color:var(--muted);font-weight:700;padding:8px 16px 12px;text-align:center;border-bottom:1px solid var(--line);margin-bottom:6px;}
.loc-action-item{display:flex;align-items:center;gap:12px;padding:13px 16px;font-size:15px;font-weight:700;cursor:pointer;border-radius:10px;margin:0 6px;transition:background .12s;border:none;background:none;width:calc(100% - 12px);text-align:left;color:var(--ink);}
.loc-action-item:hover,.loc-action-item:active{background:#f0f4f2;}
.loc-action-item.danger{color:#c0392b;}
.loc-action-item.danger:hover{background:#fdf0ee;}
.loc-action-sep{height:1px;background:var(--line);margin:4px 16px;}

/* в”Җв”Җ Wishlist FAB в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.wl-fab-wrap{position:fixed;right:20px;bottom:calc(20px + env(safe-area-inset-bottom));z-index:50;display:flex;flex-direction:column;align-items:flex-end;gap:0;pointer-events:none;}
.wl-fab-wrap > *{pointer-events:auto;}
.wl-fab-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:-1;pointer-events:none;transition:background .28s ease;}
.wl-fab-wrap.open .wl-fab-backdrop{background:rgba(0,0,0,.18);pointer-events:auto;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
.wl-fab-main{width:58px;height:58px;border-radius:50%;background:linear-gradient(140deg,#0f5e5e,#1a8a6e);color:#fff;border:none;cursor:pointer;
  box-shadow:0 6px 18px rgba(15,94,94,.4),0 2px 6px rgba(0,0,0,.1);
  display:flex;align-items:center;justify-content:center;
  transition:transform .35s cubic-bezier(.32,1.12,.6,1),box-shadow .25s ease;
  position:relative;z-index:2;}
.wl-fab-main:active{transform:scale(.94);}
.wl-fab-wrap.open .wl-fab-main{transform:rotate(135deg);box-shadow:0 8px 24px rgba(15,94,94,.5);}
.wl-fab-icon{font-size:32px;font-weight:300;line-height:1;}
.wl-fab-action{display:flex;align-items:center;gap:10px;
  background:#fff;border:1px solid var(--line);border-radius:999px;
  padding:0 6px 0 18px;height:46px;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.12);font-weight:800;font-size:14px;color:var(--ink);
  margin-bottom:12px;
  opacity:0;transform:translateY(20px) scale(.9);
  transition:opacity .25s ease,transform .35s cubic-bezier(.32,1.12,.6,1);
  pointer-events:none;}
.wl-fab-wrap.open .wl-fab-action{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.wl-fab-wrap.open .wl-fab-manual{transition-delay:.04s;}
.wl-fab-wrap.open .wl-fab-ai{transition-delay:.10s;}
.wl-fab-action-label{white-space:nowrap;}
.wl-fab-action-ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.wl-fab-manual .wl-fab-action-ic{background:#e4f4ed;color:#0f5e5e;}
.wl-fab-ai{background:linear-gradient(140deg,#5b3fc4,#7d5cd9);color:#fff;border-color:transparent;}
.wl-fab-ai .wl-fab-action-ic{background:rgba(255,255,255,.22);color:#fff;}

/* в”Җв”Җ Memo AI button в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.memo-toolbar{margin-bottom:14px;}
.memo-ai-btn{width:100%;padding:11px 18px;border-radius:14px;
  background:linear-gradient(140deg,#5b3fc4,#7d5cd9);color:#fff;border:none;cursor:pointer;
  font-size:14px;font-weight:800;
  box-shadow:0 4px 14px rgba(91,63,196,.25);
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .15s ease,box-shadow .2s ease;}
.memo-ai-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(91,63,196,.35);}
.memo-ai-btn:active{transform:translateY(0);}

/* в”Җв”Җ Global FAB + iOS action sheet в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.app-fab-wrap{display:block;}
.mobile-fab-replaced{display:none!important;}
.app-fab-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.24);z-index:59;-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);animation:fabFade .22s ease;}
.app-fab-main{position:fixed;right:20px;bottom:calc(20px + env(safe-area-inset-bottom));z-index:62;width:58px;height:58px;border-radius:50%;border:0;background:linear-gradient(140deg,#0f5e5e,#1a8a6e);color:#fff;box-shadow:0 10px 26px rgba(15,94,94,.38),0 2px 8px rgba(0,0,0,.12);font-size:34px;font-weight:300;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .24s ease,box-shadow .24s ease;}

}

  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=1600,scale=Math.min(1,max/Math.max(img.width,img.height));
      const canvas=document.createElement('canvas');
      canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
      const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,canvas.width,canvas.height);
      const data=canvas.toDataURL('image/jpeg',.82);

function getNowLocId(locs){
  if(!locs?.length)return null;
  const now=new Date(),nowMins=now.getHours()*60+now.getMinutes();
  const withTime=locs.filter(l=>l.time);
  // No times at all вҶ’ highlight first location
  if(!withTime.length)return locs[0].id;
  let upId=null,upDiff=Infinity,paId=null,paDiff=Infinity;
  for(const l of withTime){
    const[h,m]=l.time.split(':').map(Number),lm=h*60+m,d=lm-nowMins;
    if(d>=0&&d<upDiff){upDiff=d;upId=l.id;}
    else if(d<0&&-d<paDiff){paDiff=-d;paId=l.id;}
  }
  // Prefer upcoming; if all past use last passed; if nothing matched use first with time
  return upId||paId||withTime[0].id;
}

function findTodayIdx(){
  const today=localDate(),todayMs=new Date(today).getTime();
  // 1. Exact date match
  let di=S.days.findIndex(d=>d.date===today);
  if(di>=0)return di;
  // 2. Find nearest dated day (within 14 days)
  let best=Infinity,bestIdx=-1;
  S.days.forEach((d,i)=>{
    if(!d.date)return;
    const diff=Math.abs(new Date(d.date).getTime()-todayMs);
    if(diff<best){best=diff;bestIdx=i;}
  });
  if(bestIdx>=0&&best<=14*864e5)return bestIdx;
  // 3. No dates at all вҖ” use current dayIdx (don't force day 0)
  return S.dayIdx;
}

function parseAI(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const days=[];
  let cur=null;
  const timeRe=/^([0-1]?\d|2[0-3]):([0-5]\d)/;
  const dayRe=/^(?:day\s*[-вҖ“]?\s*(\d+)|з¬¬\s*(\d+)\s*еӨ©|Day\s*(\d+)|\*{0,3}з¬¬?\s*(\d+)\s*еӨ©\*{0,3})/i;
  const cityRe=/[пјҲ(]([^пјү)]+)[пјү)]/;
  const bulletRe=/^[-вҖўв—Ҷв–¶пёҸ*]+\s+/;
  const numRe=/^[\d\uff10-\uff19]+[.\uff0e\sгҖҒ]/;
  for(let line of lines){
    line=line.replace(/^\*+|\*+$/g,'').replace(/^#+\s*/,'').trim();
    if(!line)continue;
    const dm=line.match(dayRe);
    if(dm){
      const n=Number(dm[1]||dm[2]||dm[3]||dm[4]);
      const cityM=line.match(cityRe);
      const city=cityM?cityM[1].trim():'';
      const rest=line.replace(dayRe,'').replace(cityRe,'').replace(/^[\s:пјҡ\-вҖ“вҖ”]+/,'').trim();
      cur={title:`з¬¬${n}еӨ©${rest?` ${rest}`:''}`,date:'',city,locations:[]};
      days.push(cur);continue;
    }
    if(!cur){cur={title:'иЎҢзЁӢ',date:'',city:'',locations:[]};days.push(cur);}
    let l=line.replace(bulletRe,'').replace(numRe,str=>str.replace(/\S+\s*/,'')).trim();
    // Extract time
    const tm=l.match(timeRe);
    let time='';
    if(tm){time=tm[0].padStart(5,'0');l=l.slice(tm[0].length).replace(/^[\s:пјҡ\-вҖ“вҖ”]+/,'').trim();}
    // Pipe format: name | address | phone | notes | category  (3вҖ“5 fields)
    let name=l,notes='',address='',phone='',category='';
    if(l.includes('|')){
      const parts=l.split('|').map(s=>s.trim());
      name=parts[0]||'';
      address=parts[1]||'';
      phone=parts[2]||'';
      notes=parts[3]||'';
      const rawCat=(parts[4]||'').trim();
      if(CATS.includes(rawCat))category=rawCat;
    } else {
      // Fallback: name - notes
      const sepRe=/\s+[-вҖ“вҖ”]\s+/;
      const si=l.search(sepRe);
      if(si>0&&si<40){name=l.slice(0,si).trim();notes=l.slice(si).replace(/^\s*[-вҖ“вҖ”]\s*/,'').trim();}
      // Inline ең°еқҖпјҡ
      const addrM=notes.match(/ең°еқҖ[пјҡ:]\s*(.+)/);
      if(addrM){address=addrM[1].trim();notes=notes.replace(addrM[0],'').trim();}
    }
    name=name.replace(/^\d+\.\s*/,'').replace(/^[рҹ“Қрҹ—әпёҸрҹҺ«рҹҚңрҹҸЁрҹҡ—рҹӣҚпёҸрҹ“Ң]\s*/,'').trim();
    if(name.length<1||name.length>80)continue;
    const cat=category||ac(`${name} ${notes} ${address}`);
    cur.locations.push({id:uid(),name,time,address,phone,notes,category:cat,reservation:''});
  }
  return days.filter(d=>d.locations.length>0||days.length===1);
}

function copyPrompt(){
  const text=window._geminiPrompt||'';
  if(!text)return;
  const doFallback=()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');}catch{}
    document.body.removeChild(ta);
    const btn=document.getElementById('copy-prompt-btn');
    if(btn){btn.textContent='вң… е·ІиӨҮиЈҪпјҒ';setTimeout(()=>{if(btn)btn.textContent='рҹ“Ӣ иӨҮиЈҪжҸҗзӨәи©һ';},2000);}
  };
  const markDone=()=>{
    const btn=document.getElementById('copy-prompt-btn');
    if(!btn)return;
    btn.textContent='вң… е·ІиӨҮиЈҪпјҒ';btn.style.background='#0F6E56';
    setTimeout(()=>{if(btn){btn.textContent='рҹ“Ӣ иӨҮиЈҪжҸҗзӨәи©һ';btn.style.background='';}},2000);
  };
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(text).then(markDone).catch(doFallback);
  } else {doFallback();}
}
function dragStart(e,dayId,locId){
  dragState={dayId,locId};
  const wrap=e.currentTarget.closest('.loc-card-wrap');
  if(wrap)setTimeout(()=>wrap.classList.add('dragging'),0);
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',locId);
}
// Pointer-based drag for touch devices
let _touchDrag={active:false,dayId:null,locId:null,ghost:null,lastOver:null};
function startTouchDrag(e,dayId,locId){
  if(e.pointerType==='mouse'){
    // For mouse, use native HTML5 drag on the whole card instead
    const card=e.currentTarget.closest('.loc-card-wrap');
    if(card){card.setAttribute('draggable','true');card.ondragstart=ev=>dragStart(ev,dayId,locId);}
    return;
  }
  e.preventDefault();
  _touchDrag={active:true,dayId,locId,ghost:null,lastOver:null};
  const card=e.currentTarget.closest('.loc-card-wrap');
  if(card){
    card.classList.add('dragging');
    const g=card.cloneNode(true);
    g.style.cssText=`position:fixed;z-index:999;opacity:.85;pointer-events:none;width:${card.offsetWidth}px;left:${card.getBoundingClientRect().left}px;top:${card.getBoundingClientRect().top}px;transform:scale(1.02);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.2);`;
    document.body.appendChild(g);_touchDrag.ghost=g;
  }
  document.addEventListener('pointermove',_onTouchMove,{passive:false});
  document.addEventListener('pointerup',_onTouchEnd,{once:true});
}
function _onTouchMove(e){
  if(!_touchDrag.active)return;
  e.preventDefault();
  if(_touchDrag.ghost){_touchDrag.ghost.style.top=(e.clientY-40)+'px';_touchDrag.ghost.style.left=(e.clientX-80)+'px';}
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const wrap=el?.closest?.('.loc-card-wrap');
  const overId=wrap?.dataset?.locid;
  if(overId&&overId!==_touchDrag.locId){
    if(_touchDrag.lastOver)_touchDrag.lastOver.classList.remove('drag-over');
    wrap.classList.add('drag-over');_touchDrag.lastOver=wrap;
  }
}
function _onTouchEnd(e){
  document.removeEventListener('pointermove',_onTouchMove);
  if(_touchDrag.ghost)_touchDrag.ghost.remove();
  document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
  if(_touchDrag.lastOver){
    const toId=_touchDrag.lastOver.dataset.locid;
    _touchDrag.lastOver.classList.remove('drag-over');
    if(toId&&toId!==_touchDrag.locId){
      const days=JSON.parse(JSON.stringify(S.days));
      const day=days.find(d=>d.id===_touchDrag.dayId);
      if(day){const fi=day.locations.findIndex(l=>l.id===_touchDrag.locId),ti=day.locations.findIndex(l=>l.id===toId);
        if(fi>=0&&ti>=0){const[item]=day.locations.splice(fi,1);day.locations.splice(ti,0,item);setD({days});}}
    }
  }
  _touchDrag={active:false,dayId:null,locId:null,ghost:null,lastOver:null};
}
function dragOver(e){e.preventDefault();if(e.dataTransfer)e.dataTransfer.dropEffect='move';const wrap=e.currentTarget;wrap.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dragDrop(e,dayId,locId){
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  if(!dragState.locId||dragState.locId===locId||dragState.dayId!==dayId)return;
  const days=JSON.parse(JSON.stringify(S.days));
  const day=days.find(d=>d.id===dayId);
  if(!day)return;
  const fi=day.locations.findIndex(l=>l.id===dragState.locId);
  const ti=day.locations.findIndex(l=>l.id===locId);
  if(fi<0||ti<0)return;
  const [item]=day.locations.splice(fi,1);
  day.locations.splice(ti,0,item);
  setD({days});
}
function dragEnd(){
  document.querySelectorAll('.dragging,.drag-over').forEach(el=>el.classList.remove('dragging','drag-over'));
  dragState={dayId:null,locId:null};
}
function dLoc(dayId,locId){const days=JSON.parse(JSON.stringify(S.days));const day=days.find(d=>d.id===dayId);day.locations=day.locations.filter(l=>l.id!==locId);setD({days});}
function mvLoc(dayId,locId,dir){
  const days=JSON.parse(JSON.stringify(S.days)),day=days.find(d=>d.id===dayId),i=day.locations.findIndex(l=>l.id===locId),j=i+dir;
  if(i<0||j<0||j>=day.locations.length)return;
  [day.locations[i],day.locations[j]]=[day.locations[j],day.locations[i]];
  _preserveScroll=true;
  setD({days});
}
function showNoteSheet(locId, _name, triggerEl){
  const l=S.days.flatMap(d=>d.locations).find(l=>l.id===locId);
  if(!l||!triggerEl)return;

  // Get source rect from the pill element
  const src=triggerEl.getBoundingClientRect();
  const vw=window.innerWidth, vh=window.innerHeight;

  // Target: centred card, 92vw wide, up to 80vh tall
  const tw=Math.min(vw*0.92, 560);
  const th=Math.min(vh*0.80, 680);
  const tx=(vw-tw)/2, ty=(vh-th)/2;

  // Category color for stripe
  const cat=l.category||'е…¶д»–';
  const stripeColor=CBr[cat]||'#1D9E75';

  // Remove any existing
  document.getElementById('_noteBackdrop')?.remove();
  document.getElementById('_noteSheet')?.remove();

  // Backdrop
  const bd=document.createElement('div');
  bd.id='_noteBackdrop'; bd.className='note-hero-backdrop';
  bd.onclick=closeNoteSheet;
  document.body.appendChild(bd);

  // Hero card вҖ” start at pill position
  const card=document.createElement('div');
  card.id='_noteSheet'; card.className='note-hero-card';
  card.style.cssText=`top:${src.top}px;left:${src.left}px;width:${src.width}px;height:${src.height}px;border-radius:8px;`;
  card.innerHTML=`
    <div class="note-hero-inner">
      <div class="note-hero-stripe" style="background:${stripeColor};"></div>
      <div class="note-hero-hd">
        <div class="note-hero-title">${esc(l.name)}</div>
        <button class="note-hero-close" onclick="closeNoteSheet()">вң•</button>
      </div>
      <div class="note-hero-body">${esc(l.notes)}</div>
      <div class="note-hero-actions">
        <button class="btn bp" style="width:100%;padding:13px;font-size:14px;" onclick="closeNoteSheet();_heroOrigin=null;setTimeout(()=>oLoc('${l.id}'),320)">вңҸпёҸ з·ЁијҜеӮҷиЁ»</button>
      </div>
    </div>`;
  document.body.appendChild(card);

  // Swipe-down to close on mobile
  let touchStartY=0, touchCurY=0;
  card.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
  card.addEventListener('touchmove',e=>{
    touchCurY=e.touches[0].clientY;
    const dy=Math.max(0,touchCurY-touchStartY);
    if(dy>0){
      card.style.transition='none';
      card.style.transform=`translateY(${dy*0.4}px) scale(${1-dy*0.0008})`;
      bd.style.opacity=String(Math.max(0,1-dy/250));
    }
  },{passive:true});
  card.addEventListener('touchend',()=>{
    card.style.transform='';
    bd.style.opacity='';
    if(touchCurY-touchStartY>80) closeNoteSheet();
    else{
      card.style.transition='';
      card.classList.add('expanding');
    }
    touchStartY=0; touchCurY=0;
  });

  // Expand animation: two rAF to ensure start state is painted first
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    bd.classList.add('open');
    card.classList.add('expanding');
    card.style.top=`${ty}px`;
    card.style.left=`${tx}px`;
    card.style.width=`${tw}px`;
    card.style.height=`${th}px`;
    card.style.borderRadius='22px';
    card.style.boxShadow='0 20px 60px rgba(0,0,0,.25)';
  }));

  // Store origin for collapse
  card._origin={top:src.top,left:src.left,width:src.width,height:src.height};
}

function closeNoteSheet(){
  const card=document.getElementById('_noteSheet');
  const bd  =document.getElementById('_noteBackdrop');
  if(!card||!bd)return;
  const o=card._origin||{top:window.innerHeight,left:0,width:card.offsetWidth,height:44};
  card.classList.remove('expanding');
  card.classList.add('collapsing');
  card.style.top=`${o.top}px`;
  card.style.left=`${o.left}px`;
  card.style.width=`${o.width}px`;
  card.style.height=`${o.height}px`;
  card.style.borderRadius='8px';
  card.style.boxShadow='0 4px 24px rgba(0,0,0,.12)';
  bd.classList.remove('open');
  setTimeout(()=>{card.remove();bd.remove();},380);
}

function cleanName(v){
  v=String(v||'').trim();
  const half=v.length/2;
  if(v.length%2===0&&v.slice(0,half)===v.slice(half))v=v.slice(0,half);
  return v;
}

function addTv(){

  const travelerIcons={...(S.travelerIcons||{}),[v]:FM.tvIcon||'рҹҷӮ'};
  FM={tvIcon:FM.tvIcon||'рҹҷӮ',newTraveler:''};
  S={...S,travelers:[...S.travelers,v],travelerIcons};

function rmTv(name){

function downloadFile(name,type,content){
  const a=document.createElement('a'),blob=new Blob([content],{type});
  a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},0);
}

function exportCSV(){
  const rows=[['ж—Ҙжңҹ','е“Ғй …','жЁЎејҸ','еҲҶйЎһ','д»ҳж¬ҫдәә','еҺҹе№ЈеҲҘ','еҺҹйҮ‘йЎҚ','жҠҳеҗҲNTD','еҲҶеёіе°ҚиұЎ']];
  S.expenses.forEach(e=>rows.push([e.date||'',e.item||'',isPersonalExp(e)?'зҙ”иЁҳеёі':'е…ұеҗҢеҲҶеёі',e.category||'',e.paidBy||'',e.currency||'TWD',e.amount||0,expBase(e),(e.splitWith||[]).join('гҖҒ')]));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');

function importTrip(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{try{const data=JSON.parse(reader.result),trip=data.trip||data;setD({...trip,modal:null,view:'itinerary',dayIdx:0,editTN:false});}catch{alert('еҢҜе…ҘеӨұж•—пјҢи«ӢзўәиӘҚжҳҜж—…зЁӢе°ҒеӯҳжӘ”гҖӮ');}};
  reader.readAsText(file);
}
function parseReceiptText(text){
  const lines=text.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const nums=[...text.matchAll(/(?:NT\\$|TWD|TOTAL|зёҪиЁҲ|еҗҲиЁҲ|йҮ‘йЎҚ)?\\s*([0-9]{2,6}(?:[.,][0-9]{1,2})?)/gi)].map(m=>Number(m[1].replace(',','.'))).filter(n=>n>0);
  const amount=Math.max(...nums,0);
  const item=lines.find(l=>/[\\p{Script=Han}A-Za-z]{2,}/u.test(l)&&!/зҷјзҘЁ|зөұдёҖ|зёҪиЁҲ|еҗҲиЁҲ|е°ҸиЁҲ|йҮ‘йЎҚ/.test(l))||'ж”¶ж“ҡ';
  return{item,amount,category:ac(text+' '+item)};
}
async function readReceipt(file){
  if(!file)return;
  const st=document.getElementById('ocr-status');
  if(st)st.textContent='жӯЈеңЁи®ҖеҸ–ең–зүҮ...';
  const ok=await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
  if(!ok||!window.Tesseract){if(st)st.textContent='иҫЁиӯҳеҘ—д»¶ијүе…ҘеӨұж•—пјҢи«ӢжүӢеӢ•ијёе…ҘгҖӮ';return;}
  try{
    st.textContent='жӯЈеңЁ AI иҫЁиӯҳж”¶ж“ҡпјҢеҸҜиғҪйңҖиҰҒе№ҫз§’...';
    const res=await Tesseract.recognize(file,'eng+chi_tra');
    const p=parseReceiptText(res.data.text||'');
    if(p.item)FM.item=p.item;
    if(p.amount)FM.amount=String(Math.round(p.amount));
    FM.category=p.category||ac(FM.item);
    if(typeof _refreshHeroContent==='function')_refreshHeroContent();else render();
    setTimeout(()=>{const s=document.getElementById('ocr-status');if(s)s.textContent=`е·Іеё¶е…Ҙпјҡ${FM.item||'ж”¶ж“ҡ'} / ${FM.amount||'жңӘжҠ“еҲ°йҮ‘йЎҚ'} / ${FM.category}`;},0);
  }catch{if(st)st.textContent='иҫЁиӯҳеӨұж•—пјҢи«ӢжҸӣдёҖејөжӣҙжё…жҘҡзҡ„з…§зүҮжҲ–жүӢеӢ•ијёе…ҘгҖӮ';}
}

function wlCopyPrompt(){
  const text=window._wlGeminiPrompt||'';
  const btn=document.getElementById('wl-copy-prompt-btn');
  const done=()=>{if(btn){btn.textContent='вң… е·ІиӨҮиЈҪпјҒ';setTimeout(()=>{if(btn)btn.textContent='рҹ“Ӣ иӨҮиЈҪжҸҗзӨәи©һ';},2000);}};
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(text).then(done).catch(()=>{_wlCopyFallback(text);done();});}
  else{_wlCopyFallback(text);done();}
}
function _wlCopyFallback(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');}catch{}document.body.removeChild(ta);
}

const WL_CAT_TEXT_MAP={'е’–е•Ўе»і':'cafe','зҫҺйЈҹ':'food','йӨҗе»і':'food','дјҙжүӢзҰ®':'souvenir','зҙҖеҝөе“Ғ':'souvenir','жҷҜй»һ':'attraction','иіјзү©':'shopping','дҪҸе®ҝ':'hotel','йЈҜеә—':'hotel','е…¶д»–':'other'};

function _parseWlImport(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&l.includes('|'));
  const items=[];
  for(const line of lines){
    const parts=line.split('|').map(p=>p.trim());
    if(parts.length<2)continue;
    const [catText,name,address='',phone='',note='']=parts;
    if(!name)continue;
    const cat=WL_CAT_TEXT_MAP[catText]||'other';
    items.push({id:uid(),name,cat,address,phone,note,added:false});
  }
  return items;
}

function wlPreviewImport(){
  const text=document.getElementById('wl-import-box')?.value||'';
  const items=_parseWlImport(text);
  const prev=document.getElementById('wl-import-preview');
  if(prev)prev.textContent=items.length?`вң… еҒөжё¬еҲ° ${items.length} еҖӢең°й»һеҸҜеҢҜе…Ҙ`:'';
}

function wlConfirmImport(){
  const text=document.getElementById('wl-import-box')?.value||'';
  const newItems=_parseWlImport(text);
  if(!newItems.length){alert('жңӘеҒөжё¬еҲ°жңүж•Ҳж јејҸпјҢи«ӢзўәиӘҚиІјдёҠзҡ„ж јејҸжӯЈзўәгҖӮ');return;}
  const wishlist=[...(S.wishlist||[]),...newItems];
  setD({wishlist,modal:null});
  const t=document.createElement('div');
  t.className='wl-toast';
  t.textContent=`вң… е·ІеҢҜе…Ҙ ${newItems.length} еҖӢең°й»һеҲ°жё…е–®`;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2100);
}

function _mountHero(content, m){
  const vw=window.innerWidth, vh=window.innerHeight;
  const tw=Math.min(vw*0.94,600);
  const th=Math.min(vh*0.90,760);
  const tx=(vw-tw)/2, ty=Math.max(16,(vh-th)/2);
  const o=_heroOrigin||{top:vh/2,left:vw/2,width:40,height:40};

  const bd=document.createElement('div');
  bd.id='_heroBackdrop'; bd.className='hero-backdrop';
  bd.onclick=_closeHero;
  document.body.appendChild(bd);

  const card=document.createElement('div');
  card.id='_heroCard'; card.className='hero-card';
  card.style.cssText=`top:${o.top}px;left:${o.left}px;width:${o.width}px;height:${o.height}px;border-radius:10px;`;
  // Wrap existing msh-style content in hero-body
  card.innerHTML=`<div class="hero-body"><div class="msh" style="border-radius:0;padding:0;max-height:none;box-shadow:none;overflow:visible;">${content}</div></div>`;
  document.body.appendChild(card);

  // Swipe down gesture
  let ty0=0,cy0=0;
  card.addEventListener('touchstart',e=>{ty0=e.touches[0].clientY;},{passive:true});
  card.addEventListener('touchmove',e=>{
    cy0=e.touches[0].clientY;
    const dy=Math.max(0,cy0-ty0);
    if(dy>0){card.style.transition='none';card.style.transform=`translateY(${dy*.4}px) scale(${1-dy*.0006})`;bd.style.opacity=String(Math.max(0,1-dy/220));}
  },{passive:true});
  card.addEventListener('touchend',()=>{
    card.style.transform=''; bd.style.opacity='';
    if(cy0-ty0>75)_closeHero(); else{card.style.transition='';card.classList.add('animating');}
    ty0=0;cy0=0;
  });

  card._origin=o;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    bd.classList.add('open');
    card.classList.add('animating');
    card.style.top=`${ty}px`; card.style.left=`${tx}px`;
    card.style.width=`${tw}px`; card.style.height=`${th}px`;
    card.style.borderRadius='20px';
    card.style.boxShadow='0 24px 64px rgba(0,0,0,.22)';
  }));
}

function _closeHero(cb){

  const o=card._origin||{top:window.innerHeight,left:0,width:0,height:0};

  card.style.top=`${o.top}px`; card.style.left=`${o.left}px`;

// Patch setU so modal changes always trigger overlay mount
const _origSetU=setU;
function setU(u){
  // в”Җв”Җ Tab switch: always kill any open modal/overlay cleanly в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if(u.view!==undefined && u.view!==S.view){
    // Instantly remove overlays without animation (user navigated away)
    document.getElementById('_heroCard')?.remove();
    document.getElementById('_heroBackdrop')?.remove();
    document.getElementById('_sheetWrap')?.remove();
    document.getElementById('_sheetBackdrop')?.remove();
    document.getElementById('_wxSheet')?.remove();
    document.getElementById('_wxBackdrop')?.remove();
    S.quickOpen=false;
    S.wlFabOpen=false;
    u={...u,modal:null}; // clear modal state on tab switch
  }

  const hadModal=!!S.modal;
  const hasModal=u.modal!==undefined?!!u.modal:hadModal;

  // в”Җв”Җ Closing modal: animate close then apply state в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if(hadModal&&!hasModal){
    const heroCard=document.getElementById('_heroCard');
    const sheetWrap=document.getElementById('_sheetWrap');
    if(heroCard){
      const finalState={...S,...u};
      S={...S,modal:S.modal}; // keep modal during animation
      _closeHero(()=>{ S=finalState; render(); });
      return;
    }
    if(sheetWrap){
      sheetWrap.classList.remove('open');
      document.getElementById('_sheetBackdrop')?.classList.remove('open');
      sheetWrap.style.transition='';
      setTimeout(()=>{
        sheetWrap.remove();
        document.getElementById('_sheetBackdrop')?.remove();
      },360);
    }
  }

  S={...S,...u};
  render();
  // Only mount overlay if modal is newly set (not already mounted)
  if(S.modal && !document.getElementById('_heroCard') && !document.getElementById('_sheetWrap')){
    _mountModalOverlay();
  }
}

}

const MEMO_CAT_TEXT_MAP={'иӯүд»¶':'иӯүд»¶','иЎҢжқҺ':'иЎҢжқҺ','й җиЁӮ':'й җиЁӮ','й җе®ҡ':'й җиЁӮ','е…¶д»–':'е…¶д»–'};

function _parseMemoImport(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&l.includes('|'));
  const items=[];
  for(const line of lines){
    const parts=line.split('|').map(p=>p.trim());
    if(parts.length<2)continue;
    const [catText,...rest]=parts;
    const txt=rest.join(' ').trim();
    if(!txt)continue;
    const cat=MEMO_CAT_TEXT_MAP[catText]||'е…¶д»–';
    items.push({id:uid(),text:txt,cat,done:false});
  }
  return items;
}

function memoCopyPrompt(){
  const text=window._memoGeminiPrompt||'';
  const btn=document.getElementById('memo-copy-prompt-btn');
  const done=()=>{if(btn){btn.textContent='вң… е·ІиӨҮиЈҪпјҒ';setTimeout(()=>{if(btn)btn.textContent='рҹ“Ӣ иӨҮиЈҪжҸҗзӨәи©һ';},2000);}};
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(text).then(done).catch(()=>{_memoCopyFallback(text);done();});}
  else{_memoCopyFallback(text);done();}
}
function _memoCopyFallback(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');}catch{}document.body.removeChild(ta);
}

function memoPreviewImport(){
  const text=document.getElementById('memo-import-box')?.value||'';
  const items=_parseMemoImport(text);
  const prev=document.getElementById('memo-import-preview');
  if(prev)prev.textContent=items.length?`вң… еҒөжё¬еҲ° ${items.length} еҖӢеӮҷеҝҳй …зӣ®еҸҜеҢҜе…Ҙ`:'';
}

function memoConfirmImport(){
  const text=document.getElementById('memo-import-box')?.value||'';
  const newItems=_parseMemoImport(text);
  if(!newItems.length){alert('жңӘеҒөжё¬еҲ°жңүж•Ҳж јејҸпјҢи«ӢзўәиӘҚиІјдёҠзҡ„ж јејҸжӯЈзўәгҖӮ');return;}
  const memo=[...(S.memo||[]),...newItems];
  setD({memo,modal:null});
  const t=document.createElement('div');
  t.className='wl-toast';
  t.textContent=`вң… е·ІеҢҜе…Ҙ ${newItems.length} еҖӢеӮҷеҝҳй …зӣ®`;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2100);
}
