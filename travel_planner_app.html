<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f5e5e">
<title>互動旅遊行程規劃器</title>
<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",Arial,sans-serif;
  --ink:#18211f;--muted:#66736f;--line:#d9e2df;--paper:#fff;--soft:#f5f8f5;
  --teal:#0f5e5e;--mint:#dff5eb;--sun:#f2a93b;--rose:#d85d7b;--blue:#3977d4;
  --shadow:0 18px 45px rgba(20,45,40,.14);--r:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#edf4f0;color:var(--ink);font-family:var(--font-sans);-webkit-text-size-adjust:100%}
body{min-height:100vh;font-size:15px;line-height:1.45;background:linear-gradient(180deg,#edf4f0 0,#fff7eb 100%);color:var(--ink)}
button,input,select,textarea{font:inherit}
button{touch-action:manipulation}
a{text-decoration:none}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
#root{min-height:100vh}
.app{min-height:100vh;max-width:980px;margin:0 auto;background:rgba(255,255,255,.7);box-shadow:0 0 0 1px rgba(255,255,255,.55)}
.cover{position:relative;z-index:30;aspect-ratio:16/9;min-height:200px;max-height:360px;color:#fff;background:#0f5e5e;background-image:linear-gradient(to bottom,rgba(0,0,0,.55) 0%,rgba(0,0,0,.05) 38%,rgba(0,0,0,.05) 55%,rgba(0,0,0,.72) 100%),var(--cover);background-size:cover;background-position:center var(--cover-pos,30%);display:flex;flex-direction:column;justify-content:space-between}
.cover-menu-wrap{position:static;z-index:250;flex-shrink:0}
.cover-menu{position:fixed;right:12px;top:60px;z-index:250;min-width:190px;padding:8px;border-radius:18px;background:rgba(255,255,255,.97);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.7);box-shadow:0 18px 44px rgba(18,38,35,.28)}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:16px 16px 0}
.cover-bottom{padding:0 16px 18px;display:flex;flex-direction:column;gap:6px}
.hdr-title{font-size:26px;line-height:1.15;font-weight:900;letter-spacing:-.5px;cursor:pointer;text-shadow:0 2px 16px rgba(0,0,0,.5);word-break:break-word}
.hdr-title-edit-icon{font-size:14px;opacity:.65;margin-left:4px;vertical-align:middle}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.82);text-shadow:0 1px 8px rgba(0,0,0,.4);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hdr-sub-chip{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:2px 9px;font-size:11px;font-weight:700;backdrop-filter:blur(6px)}
.stats-strip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0;background:var(--card);border-bottom:1px solid var(--line);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.stat-cell{padding:13px 14px;display:flex;flex-direction:column;gap:3px;position:relative}
.stat-cell+.stat-cell::before{content:'';position:absolute;left:0;top:18%;height:64%;width:1px;background:var(--line)}
.stat-n{font-size:20px;font-weight:900;color:var(--ink);letter-spacing:-.5px;line-height:1}
.stat-l{font-size:11px;color:var(--muted);font-weight:700}
.cover-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.glass{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.26);backdrop-filter:blur(10px)}
.cover-menu-wrap{position:relative;z-index:80;flex-shrink:0}
.hamb{width:46px;height:46px;border-radius:999px;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.16);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;box-shadow:0 12px 28px rgba(0,0,0,.16)}
.hamb span{width:20px;height:2px;border-radius:99px;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.2)}
.cover-menu{position:absolute;right:0;top:54px;z-index:120;min-width:190px;padding:8px;border-radius:18px;background:rgba(255,255,255,.94);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.7);box-shadow:0 18px 44px rgba(18,38,35,.24)}
.cover-menu button{width:100%;border:0;background:transparent;color:#1b2926;display:flex;align-items:center;gap:10px;padding:12px 11px;border-radius:12px;font-weight:900;cursor:pointer;text-align:left}
.cover-menu button:active,.cover-menu button:hover{background:#eef7f3}
.cover-menu .mi{width:24px;height:24px;border-radius:8px;background:#e4f3ed;display:flex;align-items:center;justify-content:center;color:#0f5e5e}
.title-edit{display:flex;gap:8px;align-items:center;width:100%;margin-top:auto}
.tni{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:12px;padding:11px 12px;font-size:18px;font-family:var(--font-sans);flex:1;min-width:0}
.tni::placeholder{color:rgba(255,255,255,.62)}
.quick{display:none}
.nav{position:sticky;top:0;z-index:20;display:flex;gap:6px;padding:8px;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(217,226,223,.8)}
.nav-btn{flex:1;min-height:42px;padding:8px 6px;font-size:14px;color:var(--muted);border:0;background:transparent;border-radius:999px;cursor:pointer}
.nav-btn.on{color:#fff;background:var(--teal);font-weight:700;box-shadow:0 7px 18px rgba(15,94,94,.22)}
.body{padding:14px 14px calc(24px + env(safe-area-inset-bottom))}
.day-tabs{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;margin-bottom:12px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.dtab{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);box-shadow:0 4px 14px rgba(29,58,50,.05)}
.dtab.on{background:#183b40;color:#fff;border-color:#183b40}
.dtab-add{border-style:dashed;background:#fff8ec;color:#8b540c}
.section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.section-title{font-weight:800;font-size:17px;line-height:1.25;min-width:0;word-break:keep-all}
.section-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap;position:relative;flex-shrink:0}
.action-group{display:flex;align-items:center;gap:7px;position:relative;flex-wrap:nowrap}
.quick-holder{position:relative}
.card{background:var(--paper);border-radius:var(--r);border:1px solid rgba(217,226,223,.9);margin-bottom:10px;overflow:hidden;box-shadow:0 8px 24px rgba(31,59,53,.06)}
.loc-wrap{display:grid;grid-template-columns:56px minmax(0,1fr);gap:10px;padding:14px;padding-right:114px}
.loc-time{font-size:12px;font-weight:800;color:#0f6e56;padding-top:2px;width:56px;min-width:56px;white-space:nowrap;font-variant-numeric:tabular-nums}
.loc-name{font-weight:800;font-size:15px;margin-bottom:3px;word-break:break-word}
.loc-addr,.loc-phone{font-size:13px;color:var(--muted);margin-bottom:6px;word-break:break-word}
.loc-phone{display:flex;align-items:center;gap:6px}
.loc-phone a{color:#0c447c;font-weight:800}
.loc-note-pill{font-size:12px;color:#56635f;background:#f3f7f5;padding:5px 10px;border-left:3px solid #8ad5b6;margin-bottom:8px;cursor:pointer;border-radius:0 6px 6px 0;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.loc-note-pill:hover{background:#e8f4f0}
.loc-note-pill-hint{font-size:10px;color:#42a787;font-weight:900;flex-shrink:0}
.loc-sort-col{display:contents}
.sort-btn{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:0;user-select:none;-webkit-user-select:none;flex-shrink:0}
.sort-btn:disabled{opacity:.2;cursor:not-allowed}
.sort-grip{cursor:grab;color:#b0bdb9;touch-action:none}
.sort-grip:active{cursor:grabbing;color:#42a787}
.quick-menu{position:absolute;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:0 8px 28px rgba(0,0,0,.18);z-index:30;padding:5px;display:flex;flex-direction:column;gap:1px}
.quick-item{width:100%;text-align:left;background:none;border:none;padding:11px 12px;font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:9px}
.quick-item:hover,.quick-item:active{background:#f0faf5}
.brow{display:flex;gap:7px;flex-wrap:wrap}
.btn{min-height:34px;padding:7px 12px;font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;gap:4px}
.btn:active{transform:scale(.98)}
.bp{background:var(--teal);color:#fff;border-color:var(--teal)}
.ba{background:#8a560c;color:#fff;border-color:#8a560c}
.br{background:#fff0f2;color:#a52f49;border-color:#ffd0d8}
.add-btn{width:100%;min-height:48px;padding:12px;border:1px dashed #aebcb7;border-radius:var(--r);color:#52605c;font-size:14px;font-weight:800;cursor:pointer;background:#fff;margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}
.stat{background:#fff;border-radius:var(--r);padding:14px;border:1px solid var(--line);box-shadow:0 8px 24px rgba(31,59,53,.05)}
.stat:nth-child(2){background:#fff8ec}
.stat-n{font-size:21px;font-weight:900;color:#0f5e5e;word-break:break-word}
.stat-l{font-size:12px;color:var(--muted);margin-top:2px}
.exp-row{display:flex;align-items:center;gap:11px;padding:14px}
.cat-ic{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exp-inf{flex:1;min-width:0}
.exp-nm{font-weight:800;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-mt{font-size:12px;color:var(--muted);margin-top:2px}
.exp-rt{text-align:right;flex-shrink:0}
.exp-am{font-size:15px;font-weight:900}
.sh{font-size:12px;color:var(--muted);margin-bottom:8px;margin-top:14px;letter-spacing:0;text-transform:none;font-weight:900}
.brow2{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid rgba(217,226,223,.8)}
.brow2:last-child{border-bottom:none}
.txn{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:13px;background:#fff8e8;border-radius:var(--r);margin-bottom:8px;border:1px solid #f4ce84}
.empty{text-align:center;padding:34px 12px;color:var(--muted);font-size:14px}
.chip{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border-radius:999px;font-size:13px;background:#e7f6f0;color:#085041;border:1px solid #b7dfcf;font-weight:700}
.chipx{cursor:pointer;font-size:14px;line-height:1}
.avatar-pick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px}
.avatar-btn{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer}
.avatar-btn.on{border-color:#0f5e5e;background:#e7f6f0;box-shadow:0 0 0 3px rgba(15,94,94,.12)}
.bar-lb{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;gap:10px}
.bar-tr{height:7px;background:#edf2f0;border-radius:999px;margin-bottom:9px;overflow:hidden}
.mol{position:fixed;inset:0;background:rgba(10,18,17,.5);z-index:50;display:flex;align-items:flex-end;padding-top:40px}
.msh{width:100%;max-width:720px;margin:0 auto;background:#fff;border-radius:22px 22px 0 0;padding:20px 16px calc(18px + env(safe-area-inset-bottom));overflow-y:auto;max-height:min(86vh,720px);box-shadow:var(--shadow)}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mt{font-size:18px;font-weight:900}
.mcl{cursor:pointer;color:var(--muted);font-size:22px;line-height:1;padding:4px 8px}
.fg{margin-bottom:13px}
.fl{font-size:13px;color:#53615d;margin-bottom:6px;display:block;font-weight:800}
input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 12px;color:var(--ink);outline:none}
input:focus,select:focus,textarea:focus{border-color:#42a787;box-shadow:0 0 0 3px rgba(66,167,135,.15)}
.sc{padding:8px 12px;border-radius:999px;font-size:13px;font-weight:800;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);user-select:none}
.sc.on{background:#0f5e5e;color:#fff;border-color:#0f5e5e}
.scs{display:flex;flex-wrap:wrap;gap:7px}
.ah{font-size:12px;color:#0f6e56;margin-top:6px;font-weight:800}
.tip{font-size:12px;color:var(--muted);margin-top:9px}
.ar{display:flex;gap:9px;margin-top:4px}
.cover-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
.cover-choice{height:78px;border-radius:14px;border:2px solid transparent;background-size:cover;background-position:center;cursor:pointer;position:relative;overflow:hidden}
.cover-choice.on{border-color:#0f5e5e}
.cover-choice span{position:absolute;left:8px;bottom:7px;color:#fff;font-size:12px;font-weight:900;text-shadow:0 1px 6px rgba(0,0,0,.45)}
.tool-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.tmpl-btn{padding:8px 13px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid rgba(0,0,0,.06);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:opacity .15s,transform .1s}
.tmpl-btn:active{transform:scale(.97)}
/* sort controls top-right of card */
.loc-sort-ctrl{position:absolute;top:8px;right:8px;display:flex;gap:3px;align-items:center;z-index:2}
.sort-btn{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:0;user-select:none;-webkit-user-select:none;flex-shrink:0}
.sort-btn:disabled{opacity:.2;cursor:not-allowed}
.sort-grip{cursor:grab;color:#b0bdb9;letter-spacing:-.5px;touch-action:none;font-size:17px}
.sort-grip:active{cursor:grabbing;color:#42a787}
/* icon action buttons */
.act-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px}
.btn-ic{width:34px;height:34px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);flex-shrink:0;text-decoration:none;padding:0;line-height:1}
.btn-ic.bp{background:#0f5e5e;border-color:#0f5e5e;color:#fff}
.btn-ic.ba{background:#854F0B;border-color:#854F0B;color:#fff}
.btn-ic.br{background:#fff5f5;border-color:#f5c6cb;color:#c0392b}
.note-modal-body{font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;color:var(--ink);background:#f3f7f5;border-radius:var(--r);padding:14px;border-left:3px solid #8ad5b6;margin-bottom:14px;max-height:40vh;overflow-y:auto}
.memo-add-row{display:flex;gap:7px;margin-top:14px;align-items:stretch}
.memo-cat-sel{font-size:13px;padding:0 6px;border-radius:var(--r);border:1px solid var(--line);background:var(--card);color:var(--ink);min-height:44px;width:90px;flex-shrink:0}
.memo-cat-hd{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:14px;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.memo-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--card);border-radius:var(--r);border:1px solid var(--line);margin-bottom:6px}
.memo-item.done .memo-text{text-decoration:line-through;color:var(--muted);opacity:.55}
.memo-cb{width:22px;height:22px;border-radius:7px;border:2px solid #aebcb7;background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .12s;font-size:13px}
.memo-cb.on{background:#0f5e5e;border-color:#0f5e5e;color:#fff}
.memo-text{font-size:14px;flex:1;min-width:0;word-break:break-word;line-height:1.5}
.memo-del{color:var(--muted);font-size:20px;cursor:pointer;opacity:.35;flex-shrink:0;line-height:1;padding:0 2px;margin-top:-1px}
.memo-del:hover,.memo-del:active{opacity:.9}
.loc-cat-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:800;vertical-align:middle;white-space:nowrap}
.loc-now-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:900;border:none;animation:now-pulse 1.8s ease-in-out infinite;letter-spacing:.02em}
@keyframes now-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.78;transform:scale(.97)}}
.loc-card-wrap.loc-now>.card{background:linear-gradient(160deg,var(--now-bg,#f4fcf8) 0%,#fff 55%)!important}
.loc-now-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:12px;font-weight:900;letter-spacing:.04em}
.weather-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f0f8ff;border-radius:12px;font-size:13px;font-weight:700;margin-bottom:12px;border:1px solid #cde4f5;flex-wrap:wrap;color:#1a3a5c}
.weather-ic{font-size:22px;line-height:1;flex-shrink:0}
.weather-val{font-size:17px;font-weight:900;color:#0f5e5e}
.weather-sub{font-size:11px;color:var(--muted);font-weight:700}
.weather-city{font-size:11px;color:var(--muted);margin-left:auto}
.import-area{width:100%;min-height:160px;border:1px solid var(--line);border-radius:var(--r);padding:10px 12px;font-size:13px;font-family:var(--font,sans-serif);resize:vertical;background:var(--color-background-secondary,#f8fafa);line-height:1.6}
.import-preview{background:#f0f8f4;border:1px solid #b6e0cc;border-radius:var(--r);padding:12px;margin-top:10px;font-size:12px;max-height:220px;overflow-y:auto}
.import-day-hd{font-weight:900;font-size:13px;color:#085041;margin-bottom:4px;margin-top:10px}
.import-day-hd:first-child{margin-top:0}
.import-loc-row{display:flex;gap:6px;align-items:baseline;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.import-loc-time{font-size:11px;color:var(--muted);min-width:38px;flex-shrink:0}
.import-loc-name{font-size:13px;font-weight:700}
.import-loc-cat{font-size:10px;padding:1px 6px;border-radius:999px}
.import-err{color:#a32d2d;font-size:13px;padding:10px;background:#fff5f5;border-radius:var(--r);border:1px solid #f2baba;margin-top:8px}
.loc-card-wrap .card{border-left-width:3px;border-left-style:solid;position:relative}
.loc-card-wrap.dragging{opacity:.35;transform:scale(.98)}
.loc-card-wrap.drag-over .card{border-color:#42a787!important;box-shadow:0 0 0 2px rgba(66,167,135,.25)!important}
.budget-card{padding:14px;background:#fff;border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;box-shadow:0 8px 24px rgba(31,59,53,.05)}
.budget-line{height:9px;border-radius:999px;background:#edf2f0;overflow:hidden;margin-top:8px}
.budget-fill{height:100%;border-radius:999px;background:#1d9e75}
.budget-fill.warn{background:#ef9f27}.budget-fill.over{background:#d4535f}
.receipt-box{border:1px dashed #aebcb7;border-radius:14px;padding:12px;background:#f7faf8;margin-bottom:13px}
.mini{font-size:12px;color:var(--muted);font-weight:700}
@media (min-width:720px){
  .app{margin:18px auto;border-radius:24px;overflow:hidden;min-height:calc(100vh - 36px)}
  .cover{aspect-ratio:unset;min-height:320px;max-height:420px}
  .body{padding:20px 24px 34px}
  .hdr-title{font-size:36px;letter-spacing:-.8px}
  .stat-n{font-size:22px}
  .msh{border-radius:22px;margin-bottom:24px}
}
@media (max-width:640px){
  body{font-size:14px}
  .cover{aspect-ratio:16/9;min-height:180px;max-height:280px}
  .hdr-title{font-size:22px}
  .topbar{display:flex;align-items:flex-start}
  .cover-menu{right:12px;top:54px;left:auto;max-height:calc(100vh - 80px);overflow-y:auto}

function ac(s){for(const[r,c]of CR)if(r.test(s))return c;return'其他';}

function ntd(n){return money(n);}

let FX={rates:null,date:'',status:'使用內建匯率'};
function convertAmount(amount,from='TWD',to='TWD'){
  amount=Number(amount)||0;from=from||'TWD';to=to||'TWD';
  if(from===to)return amount;
  if(FX.rates?.[from]&&FX.rates?.[to])return amount/FX.rates[from]*FX.rates[to];
  return amount*(CUR[from]||1)/(CUR[to]||1);
}
function expValue(e,c=S.settleCurrency||'TWD'){return convertAmount(e.amount,e.currency||'TWD',c);}
function fmt(n,c=S.settleCurrency||'TWD'){

function canSharedStorage(){return !!(window.storage&&window.storage.get&&window.storage.set);}

async function setSaved(key,value){if(canSharedStorage())await window.storage.set(key,value,true);else localStorage.setItem(key,value);}
function settle(exps,tvls){
  const b=Object.fromEntries(tvls.map(t=>[t,0]));
  const cur=S.settleCurrency||'TWD';
  for(const e of exps){
    const shares=e.shares||null;
    if(shares){
      for(const [p,raw] of Object.entries(shares)){const sh=convertAmount(raw,e.currency||'TWD',cur);if(p===e.paidBy)continue;if(p in b)b[p]-=sh;if(e.paidBy in b)b[e.paidBy]+=sh;}
      continue;
    }
    if(!e.splitWith?.length)continue;const sh=expValue(e,cur)/e.splitWith.length;for(const p of e.splitWith){if(p===e.paidBy)continue;if(p in b)b[p]-=sh;if(e.paidBy in b)b[e.paidBy]+=sh;}
  }
  let cr=Object.entries(b).filter(([,v])=>v>0.01).map(([n,v])=>({n,v})).sort((a,x)=>x.v-a.v);
  let de=Object.entries(b).filter(([,v])=>v<-0.01).map(([n,v])=>({n,v:-v})).sort((a,x)=>x.v-a.v);
  const tx=[];
  while(cr.length&&de.length){const c=cr[0],d=de[0],am=Math.min(c.v,d.v);if(am>0.01)tx.push({from:d.n,to:c.n,amount:Math.round(am)});c.v-=am;d.v-=am;if(c.v<0.01)cr.shift();if(d.v<0.01)de.shift();}
  return{b,tx};
}
let S={tripName:'2026 旅遊計畫',cover:COVERS[0][1],coverPos:'30%',budget:0,settleCurrency:'TWD',days:[{id:'d1',title:'第一天',date:'',locations:[]}],travelers:['旅伴A','旅伴B'],travelerIcons:{旅伴A:'🙂',旅伴B:'😎'},expenses:[],memo:[],view:'itinerary',dayIdx:0,modal:null,editTN:false,tnDraft:''};

function loadScript(src){

async function initCloud(){
  await loadScript('./firebase-config.js');

  if(!ok1||!ok2||!window.firebase){cloud.status='雲端套件載入失敗';return false;}
  try{
    const app=window.firebase.apps?.length?window.firebase.app():window.firebase.initializeApp(window.TRAVEL_APP_FIREBASE);
    const db=window.firebase.firestore(app);
    const params=new URLSearchParams(location.search);
    let tripId=params.get('trip');
    if(!tripId){
      cloud={ready:true,doc:null,tripId:null,status:'請輸入同步代碼',applying:false};
      S={...S,modal:{t:'tripGate'}};

    cloud={ready:true,doc:db.collection('trips').doc(tripId),tripId,status:'雲端同步中',applying:false};

      const data=snap.data()||{};
      cloud.applying=true;
      S={...S,...data,settleCurrency:data.settleCurrency||S.settleCurrency||'TWD',travelerIcons:data.travelerIcons||S.travelerIcons||{},budget:Number(data.budget||0),cover:data.cover||S.cover,coverPos:data.coverPos||S.coverPos||'30%',view:S.view,dayIdx:S.dayIdx,modal:S.modal,editTN:S.editTN,tnDraft:S.tnDraft};

    },()=>{cloud.status='同步失敗，暫存本機';render();});

}

function exps(te){

  const budget=Number(S.budget||0), budgetCur=convertAmount(budget,'TWD',S.settleCurrency||'TWD'), pct=budgetCur?Math.min(100,Math.round(te/budgetCur*100)):0, cls=pct>=100?'over':pct>=80?'warn':'';

  const list=S.expenses.length?S.expenses.map(e=>`<div class="card"><div class="exp-row"><div class="cat-ic" style="background:${CB[e.category]||'#F1EFE8'}">${CE[e.category]||'📌'}</div><div class="exp-inf"><div class="exp-nm">${esc(e.item)}</div><div class="exp-mt">${esc(e.paidBy)} · ${e.shares?'自訂分擔':`${e.splitWith?.length||0}人分`} · <span style="color:${CF[e.category]||'#444'};">${e.category||'其他'}</span>${e.currency&&e.currency!=='TWD'?` · ${esc(e.currency)} ${Number(e.amount||0).toLocaleString()}`:''}</div></div><div class="exp-rt"><div class="exp-am">${fmt(expValue(e))}</div><div class="brow" style="margin-top:7px;justify-content:flex-end;"><button class="btn" style="min-height:30px;padding:4px 8px;" onclick="oExp('${e.id}')">編輯</button><button class="btn br" style="min-height:30px;padding:4px 8px;" onclick="dExp('${e.id}')">刪</button></div></div></div></div>`).join(''):`<div class="empty"><div style="font-size:30px;margin-bottom:8px;">💰</div>尚無帳目記錄</div>`;

function splt(b,tx,te){
  const br=S.travelers.map(t=>{const v=b[t]||0,paid=S.expenses.filter(e=>e.paidBy===t).reduce((s,e)=>s+expValue(e),0),pos=v>=0;return`<div class="brow2"><div><div style="font-weight:900;font-size:15px;">${esc(t)}</div><div style="font-size:12px;color:var(--muted);">已付 ${fmt(paid)}</div></div><div style="font-weight:900;font-size:14px;color:${pos?'#0F6E56':'#A32D2D'};text-align:right;">${pos?`+ ${fmt(Math.abs(v))} 應收`:`${fmt(Math.abs(v))} 應付`}</div></div>`;}).join('');

  const det=S.expenses.length?`<div class="sh">帳目明細</div>${S.expenses.map(e=>`<div class="card" style="padding:12px 14px;margin-bottom:8px;"><div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:4px;"><div style="font-weight:900;">${CE[e.category]||'📌'} ${esc(e.item)}</div><div style="font-weight:900;">${fmt(expValue(e))}</div></div><div style="font-size:12px;color:var(--muted);margin-bottom:8px;">${esc(e.paidBy)} 先付款${e.shares?' · 自訂分擔':` · 每人 ${fmt(expValue(e)/(e.splitWith?.length||1))}`}</div><div style="display:flex;flex-wrap:wrap;gap:5px;">${(e.shares?Object.entries(e.shares).filter(([,v])=>Number(v)>0).map(([p,v])=>`${p}:${v}`):(e.splitWith||[]).map(p=>[p,null])).map(([p,v])=>`<span style="font-size:12px;padding:3px 9px;background:${p===e.paidBy?'#E1F5EE':'#f2f5f3'};color:${p===e.paidBy?'#085041':'#66736f'};border-radius:999px;border:1px solid ${p===e.paidBy?'#9FE1CB':'transparent'};">${esc(p)}${v?` ${fmt(convertAmount(v,e.currency||'TWD',S.settleCurrency||'TWD'))}`:''}${p===e.paidBy?' (付)':''}</span>`).join('')}</div></div>`).join('')}`:'';

}

function uploadCover(file){
  if(!file)return;
  if(!file.type.startsWith('image/')){alert('請選擇圖片檔');return;}
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=1600,scale=Math.min(1,max/Math.max(img.width,img.height));
      const canvas=document.createElement('canvas');
      canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
      const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,canvas.width,canvas.height);
      const data=canvas.toDataURL('image/jpeg',.82);
      if(data.length>900000){alert('這張圖片壓縮後還是太大，請換一張較小的圖片。');return;}
      setD({cover:data,modal:null});
    };
    img.onerror=()=>alert('圖片讀取失敗，請換一張試試。');
    img.src=reader.result;
  };
  reader.onerror=()=>alert('圖片讀取失敗，請換一張試試。');
  reader.readAsDataURL(file);
}

function getNowLocId(locs){
  if(!locs?.length)return null;
  const now=new Date(),nowMins=now.getHours()*60+now.getMinutes();
  const withTime=locs.filter(l=>l.time);
  // No times at all → highlight first location
  if(!withTime.length)return locs[0].id;
  let upId=null,upDiff=Infinity,paId=null,paDiff=Infinity;
  for(const l of withTime){
    const[h,m]=l.time.split(':').map(Number),lm=h*60+m,d=lm-nowMins;
    if(d>=0&&d<upDiff){upDiff=d;upId=l.id;}
    else if(d<0&&-d<paDiff){paDiff=-d;paId=l.id;}
  }
  // Prefer upcoming; if all past use last passed; if nothing matched use first with time
  return upId||paId||withTime[0].id;
}
function localDate(d=new Date()){
  const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  return`${y}-${mo}-${dd}`;
}
function findTodayIdx(){
  const today=localDate(),todayMs=new Date(today).getTime();
  // 1. Exact date match
  let di=S.days.findIndex(d=>d.date===today);
  if(di>=0)return di;
  // 2. Find nearest dated day (within 14 days)
  let best=Infinity,bestIdx=-1;
  S.days.forEach((d,i)=>{
    if(!d.date)return;
    const diff=Math.abs(new Date(d.date).getTime()-todayMs);
    if(diff<best){best=diff;bestIdx=i;}
  });
  if(bestIdx>=0&&best<=14*864e5)return bestIdx;
  // 3. No dates at all — use current dayIdx (don't force day 0)
  return S.dayIdx;
}

function parseAI(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const days=[];
  let cur=null;
  const timeRe=/^([0-1]?\d|2[0-3]):([0-5]\d)/;
  const dayRe=/^(?:day\s*[-–]?\s*(\d+)|第\s*(\d+)\s*天|Day\s*(\d+)|\*{0,3}第?\s*(\d+)\s*天\*{0,3})/i;
  const cityRe=/[（(]([^）)]+)[）)]/;
  const bulletRe=/^[-•◆▶️*]+\s+/;
  const numRe=/^[\d\uff10-\uff19]+[.\uff0e\s、]/;
  for(let line of lines){
    line=line.replace(/^\*+|\*+$/g,'').replace(/^#+\s*/,'').trim();
    if(!line)continue;
    const dm=line.match(dayRe);
    if(dm){
      const n=Number(dm[1]||dm[2]||dm[3]||dm[4]);
      const cityM=line.match(cityRe);
      const city=cityM?cityM[1].trim():'';
      const rest=line.replace(dayRe,'').replace(cityRe,'').replace(/^[\s:：\-–—]+/,'').trim();
      cur={title:`第${n}天${rest?` ${rest}`:''}`,date:'',city,locations:[]};
      days.push(cur);continue;
    }
    if(!cur){cur={title:'行程',date:'',city:'',locations:[]};days.push(cur);}
    let l=line.replace(bulletRe,'').replace(numRe,str=>str.replace(/\S+\s*/,'')).trim();
    // Extract time
    const tm=l.match(timeRe);
    let time='';
    if(tm){time=tm[0].padStart(5,'0');l=l.slice(tm[0].length).replace(/^[\s:：\-–—]+/,'').trim();}
    // Pipe format: name | address | phone | notes | category  (3–5 fields)
    let name=l,notes='',address='',phone='',category='';
    if(l.includes('|')){
      const parts=l.split('|').map(s=>s.trim());
      name=parts[0]||'';
      address=parts[1]||'';
      phone=parts[2]||'';
      notes=parts[3]||'';
      const rawCat=(parts[4]||'').trim();
      if(CATS.includes(rawCat))category=rawCat;
    } else {
      // Fallback: name - notes
      const sepRe=/\s+[-–—]\s+/;
      const si=l.search(sepRe);
      if(si>0&&si<40){name=l.slice(0,si).trim();notes=l.slice(si).replace(/^\s*[-–—]\s*/,'').trim();}
      // Inline 地址：
      const addrM=notes.match(/地址[：:]\s*(.+)/);
      if(addrM){address=addrM[1].trim();notes=notes.replace(addrM[0],'').trim();}
    }
    name=name.replace(/^\d+\.\s*/,'').replace(/^[📍🗺️🎫🍜🏨🚗🛍️📌]\s*/,'').trim();
    if(name.length<1||name.length>80)continue;
    const cat=category||ac(`${name} ${notes} ${address}`);
    cur.locations.push({id:uid(),name,time,address,phone,notes,category:cat,reservation:''});
  }
  return days.filter(d=>d.locations.length>0||days.length===1);
}

function copyPrompt(){
  const text=window._geminiPrompt||'';
  if(!text)return;
  const doFallback=()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');}catch{}
    document.body.removeChild(ta);
    const btn=document.getElementById('copy-prompt-btn');
    if(btn){btn.textContent='✅ 已複製！';setTimeout(()=>{if(btn)btn.textContent='📋 複製提示詞';},2000);}
  };
  const markDone=()=>{
    const btn=document.getElementById('copy-prompt-btn');
    if(!btn)return;
    btn.textContent='✅ 已複製！';btn.style.background='#0F6E56';
    setTimeout(()=>{if(btn){btn.textContent='📋 複製提示詞';btn.style.background='';}},2000);
  };
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(text).then(markDone).catch(doFallback);
  } else {doFallback();}
}
function dragStart(e,dayId,locId){
  dragState={dayId,locId};

// Pointer-based drag for touch devices
let _touchDrag={active:false,dayId:null,locId:null,ghost:null,lastOver:null};
function startTouchDrag(e,dayId,locId){
  if(e.pointerType==='mouse'){
    // For mouse, use native HTML5 drag on the whole card instead
    const card=e.currentTarget.closest('.loc-card-wrap');
    if(card){card.setAttribute('draggable','true');card.ondragstart=ev=>dragStart(ev,dayId,locId);}
    return;
  }
  e.preventDefault();
  _touchDrag={active:true,dayId,locId,ghost:null,lastOver:null};
  const card=e.currentTarget.closest('.loc-card-wrap');
  if(card){
    card.classList.add('dragging');
    const g=card.cloneNode(true);
    g.style.cssText=`position:fixed;z-index:999;opacity:.85;pointer-events:none;width:${card.offsetWidth}px;left:${card.getBoundingClientRect().left}px;top:${card.getBoundingClientRect().top}px;transform:scale(1.02);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.2);`;
    document.body.appendChild(g);_touchDrag.ghost=g;
  }
  document.addEventListener('pointermove',_onTouchMove,{passive:false});
  document.addEventListener('pointerup',_onTouchEnd,{once:true});
}
function _onTouchMove(e){
  if(!_touchDrag.active)return;
  e.preventDefault();
  if(_touchDrag.ghost){_touchDrag.ghost.style.top=(e.clientY-40)+'px';_touchDrag.ghost.style.left=(e.clientX-80)+'px';}
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const wrap=el?.closest?.('.loc-card-wrap');
  const overId=wrap?.dataset?.locid;
  if(overId&&overId!==_touchDrag.locId){
    if(_touchDrag.lastOver)_touchDrag.lastOver.classList.remove('drag-over');
    wrap.classList.add('drag-over');_touchDrag.lastOver=wrap;
  }
}
function _onTouchEnd(e){
  document.removeEventListener('pointermove',_onTouchMove);
  if(_touchDrag.ghost)_touchDrag.ghost.remove();
  document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
  if(_touchDrag.lastOver){
    const toId=_touchDrag.lastOver.dataset.locid;
    _touchDrag.lastOver.classList.remove('drag-over');
    if(toId&&toId!==_touchDrag.locId){
      const days=JSON.parse(JSON.stringify(S.days));
      const day=days.find(d=>d.id===_touchDrag.dayId);
      if(day){const fi=day.locations.findIndex(l=>l.id===_touchDrag.locId),ti=day.locations.findIndex(l=>l.id===toId);
        if(fi>=0&&ti>=0){const[item]=day.locations.splice(fi,1);day.locations.splice(ti,0,item);setD({days});}}
    }
  }
  _touchDrag={active:false,dayId:null,locId:null,ghost:null,lastOver:null};
}
function dragOver(e){e.preventDefault();if(e.dataTransfer)e.dataTransfer.dropEffect='move';const wrap=e.currentTarget;wrap.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dragDrop(e,dayId,locId){
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  if(!dragState.locId||dragState.locId===locId||dragState.dayId!==dayId)return;
  const days=JSON.parse(JSON.stringify(S.days));
  const day=days.find(d=>d.id===dayId);
  if(!day)return;
  const fi=day.locations.findIndex(l=>l.id===dragState.locId);
  const ti=day.locations.findIndex(l=>l.id===locId);
  if(fi<0||ti<0)return;
  const [item]=day.locations.splice(fi,1);
  day.locations.splice(ti,0,item);
  setD({days});
}
function dragEnd(){
  document.querySelectorAll('.dragging,.drag-over').forEach(el=>el.classList.remove('dragging','drag-over'));

}

function parseReceiptText(text){
  const lines=text.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const nums=[...text.matchAll(/(?:NT\\$|TWD|TOTAL|總計|合計|金額)?\\s*([0-9]{2,6}(?:[.,][0-9]{1,2})?)/gi)].map(m=>Number(m[1].replace(',','.'))).filter(n=>n>0);
  const amount=Math.max(...nums,0);
  const item=lines.find(l=>/[\\p{Script=Han}A-Za-z]{2,}/u.test(l)&&!/發票|統一|總計|合計|小計|金額/.test(l))||'收據';
  return{item,amount,category:ac(text+' '+item)};
}
async function readReceipt(file){
  if(!file)return;
  const st=document.getElementById('ocr-status');
  if(st)st.textContent='正在讀取圖片...';
  const ok=await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
  if(!ok||!window.Tesseract){if(st)st.textContent='辨識套件載入失敗，請手動輸入。';return;}
  try{
    st.textContent='正在 AI 辨識收據，可能需要幾秒...';
    const res=await Tesseract.recognize(file,'eng+chi_tra');
    const p=parseReceiptText(res.data.text||'');
    if(p.item)FM.item=p.item;
    if(p.amount)FM.amount=String(Math.round(p.amount));
    FM.category=p.category||ac(FM.item);
    render();
    setTimeout(()=>{const s=document.getElementById('ocr-status');if(s)s.textContent=`已帶入：${FM.item||'收據'} / ${FM.amount||'未抓到金額'} / ${FM.category}`;},0);
  }catch{if(st)st.textContent='辨識失敗，請換一張更清楚的照片或手動輸入。';}
}

    const isSel=loc.id===_mapSelLocId;
    const addrEl=loc.address?`<div class="map-loc-addr">📍 ${esc(loc.address)}</div>`:'';
    return`<div class="map-loc-card${isSel?' on':''}" onclick="_mapSelLocId='${loc.id}';renderMapIframe()">
      <span class="map-loc-seq">${seq}</span>
      <div class="map-loc-badge" style="background:${bg};color:${fc};">${CE[cat]||'📌'} ${cat}</div>
      <div class="map-loc-name">${esc(loc.name)}</div>
      <div class="map-loc-meta">📅 ${esc(day.title)}${loc.time?' · 🕐 '+esc(loc.time):''}</div>
      ${addrEl}
    </div>`;
  }).join(''):`<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center;">此天數沒有地點<br>請在「行程」頁籤新增</div>`;

  const iframeHtml=_mapBuildIframe();

  return`<div id="map-view-wrap">
    <div id="map-day-tabs">${dayTabs}</div>
    <div id="map-body">
      <div id="map-loc-list">${locCards}</div>
      <div id="map-iframe-wrap">${iframeHtml}</div>
    </div>
  </div>`;
}

function _mapGetLocs(){
  const out=[];let seq=0;
  S.days.forEach(day=>{
    if(_mapFilterDay!=='all'&&_mapFilterDay!==day.id)return;
    (day.locations||[]).forEach(loc=>{out.push({loc,day,seq:++seq});});
  });
  return out;
}

function _mapBuildIframe(){
  const allLocs=_mapGetLocs();
  const sel=allLocs.find(x=>x.loc.id===_mapSelLocId);
  if(!sel)return`<div id="map-no-sel"><div style="font-size:32px;">🗺️</div><div>點左側地點可在 Google Maps 上查看</div></div>`;
  const loc=sel.loc;
  const q=encodeURIComponent((loc.address?loc.name+' '+loc.address:loc.name).trim());
  const src=`https://maps.google.com/maps?q=${q}&output=embed&hl=zh-TW`;
  const gmUrl=`https://www.google.com/maps/search/?api=1&query=${q}`;
  return`<iframe src="${src}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  <a id="map-open-btn" href="${gmUrl}" target="_blank" rel="noopener">🗺️ 在 Google Maps 開啟</a>`;
}

function renderMapIframe(){
  // Update iframe and card highlight without full re-render
  const iframeWrap=document.getElementById('map-iframe-wrap');
  if(iframeWrap)iframeWrap.innerHTML=_mapBuildIframe();
  document.querySelectorAll('.map-loc-card').forEach(el=>{
    // find locId from onclick attr
    const m=el.getAttribute('onclick')?.match(/_mapSelLocId='([^']+)'/);
    if(m)el.classList.toggle('on',m[1]===_mapSelLocId);
  });
}

load();
loadFx();
</script>
</body>
</html>
